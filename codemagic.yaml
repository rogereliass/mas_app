workflows:
  ios-workflow:
    name: iOS Automatic Signing
    integrations:
      app_store_connect: MAS
    environment:
      ios_signing:
          distribution_type: app_store
          bundle_identifier: com.masapp.digitalteam
      vars:
        BUNDLE_ID: "com.masapp.digitalteam"
        XCODE_SCHEME: "Runner"
        # Apple secrets are defined in Codemagic UI, not here
    scripts:
      - name: Install Flutter
        script: |
          git clone https://github.com/flutter/flutter.git -b stable
          export PATH="$PATH:`pwd`/flutter/bin"
          flutter doctor
      - name: Get dependencies
        script: flutter pub get
      - name: Clean build
        script: flutter clean
      - name: Build iOS IPA
        script: |
          flutter build ipa --release
          # Codemagic will automatically sign using secrets in UI
    artifacts:
      - build/ios/ipa/*.ipa